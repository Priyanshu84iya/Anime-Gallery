<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/vite.svg">
    <title>Anime Scene Gallery</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        height: 100vh;
        overflow: hidden;
      }

      .button {
        position: fixed;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: transparent;
        color: rgb(212 212 216);
        border: none;
        border-radius: 50px;
        padding: 10px 20px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: none;
        transition: transform 0.2s, box-shadow 0.3s;
      }

      .button:hover {
        transform: scale(1.1);
        box-shadow: 0 0 15px black;
      }

      .icon {
        margin-right: 8px;
      }

      .github-button {
        bottom: 20px;
        right: 20px;
      }

      .instagram-button {
        bottom: 80px;
        right: 20px;
      }

      .linkedin-button {
        bottom: 140px;
        right: 20px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- GitHub Button -->
    <button class="button github-button" onclick="redirectToGithub()">
      <svg class="icon" xmlns="http://www.w3.org/2000/svg" height="20" width="20" viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.[...]
      </svg>
      GitHub Profile
    </button>

    <!-- Instagram Button -->
    <button class="button instagram-button" onclick="redirectToInstagram()">
      <svg class="icon" xmlns="http://www.w3.org/2000/svg" height="20" width="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2.163c3.204 0 3.584.012 4.85.07 1.366.062 2.633.346 3.608 1.321.975.975 1.26 2.242 1.321 3.608.059 1.266.07 1.646.07 4.85s-.012 3.584-.07 4.85c-.062 1.366-.346 2.633-1.321 3.6[...]
      </svg>
      Instagram
    </button>

    <!-- LinkedIn Button -->
    <button class="button linkedin-button" onclick="redirectToLinkedin()">
      <svg class="icon" xmlns="http://www.w3.org/2000/svg" height="20" width="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M20.451 20.452H17.3v-5.368c0-1.281-.025-2.932-1.786-2.932-1.786 0-2.06 1.394-2.06 2.836v5.464H10.3V9h3.012v1.561h.042c.42-.797 1.444-1.637 2.974-1.637 3.179 0 3.765 2.093 3.765 4.[...]
      </svg>
      LinkedIn
    </button>

    <script>
      function redirectToGithub() {
        window.open('https://github.com/Priyanshu84iya', '_blank');
      }

      function redirectToInstagram() {
        window.open('https://www.instagram.com/priyansh.u26', '_blank');
      }

      function redirectToLinkedin() {
        window.open('https://www.linkedin.com/in/priyanshu-chaurasiya-8986a833b/', '_blank');
      }
    </script>
  </body>
</html>
